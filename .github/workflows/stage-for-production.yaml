name: 🎣 Create Production Release

on:
  pull_request:
    types: [closed]
    branches:
      - "release"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. v1.2.0)"
        required: false
        type: string
      reason:
        description: "Reason for release"
        required: false
        default: "Manual release"
        type: string

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  create-release:
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: Staging
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            NEW_TAG="${{ github.event.inputs.version }}"
          else
            # Get the latest tag or start at v1.0.0 if no tags exist
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
            
            # Split version into major, minor, patch
            IFS='.' read -r major minor patch < <(echo "${LATEST_TAG#v}" | tr '.' '\n')
            
            # Increment minor version and reset patch
            NEW_TAG="v$major.$((minor + 1)).0"
          fi
          
          # Generate release notes from commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            RELEASE_NOTES=$(git log --pretty=format:"- %s (%h)" $LAST_TAG..HEAD)
          else
            RELEASE_NOTES=$(git log --pretty=format:"- %s (%h)")
          fi
          
          if [ -z "$RELEASE_NOTES" ]; then
            RELEASE_NOTES="No changes since last release"
          fi
          
          # Create the release
          REASON="${{ github.event.inputs.reason || format('Merged changes from release branch') }}"
          ACTOR="${{ github.actor }}"
          DATE=$(date)
          
          gh release create $NEW_TAG \
            --title "Release $NEW_TAG" \
            --target release \
            --draft false \
            --notes "🚀 Production Release $NEW_TAG

            **Initiated by:** $ACTOR
            **Reason:** $REASON
            **Date:** $DATE
            
            ## Changes included in this release:
            $RELEASE_NOTES"
